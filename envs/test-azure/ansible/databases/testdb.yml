database_spec:
  name: "testdb"
  owner: "testuser"
  encoding: "UTF8"

  users:
    - name: "testuser"
      password_env: "ANSIBLE_TESTDB_TESTUSER_PASSWORD"
      role_attr_flags: "LOGIN"
      grants:
        - type: "database"
          privs: "ALL"
          grant_option: true

  extensions: []
