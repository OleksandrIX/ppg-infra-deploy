# LVM configuration for PostgreSQL data storage
lvm_state: "create"
pv_devices: ["/dev/sdb"]
vg_name: "vg_pgdata"
lv_name: "lv_pgdata"
fs_type: "xfs"
mount_path: "/var/lib/postgresql"

# General configuration
postgres_monitoring_user: "exporter"

# Hosts
postgres_hosts: "{{ groups['pg_nodes'] }}"
etcd_hosts: "{{ groups['pg_nodes'] }}"
allow_connection_hosts: []

# etcd configuration
etcd_version: "v3.6.9"
etcd_cluster_token: "ppg-cluster-dev-token"
etcd_data_dir: "/var/lib/etcd/postgresql"

# PostgreSQL configuration
psql_version: "18"
psql_home_dir: "/var/lib/postgresql"
psql_data_dir: "/var/lib/postgresql/data"
psql_bin_dir: "/usr/lib/postgresql/{{ psql_version }}/bin"
psql_password_encryption: "scram-sha-256"

# Patroni configuration
patroni_scope: "postgresql-cluster"
patroni_namespace: "/service/"
patroni_restapi_user: "admin"

# PgBouncer configuration
pgbouncer_auth_user: "pgbouncer_auth"

# HAProxy + Keepalived deployment (disabled for Azure)
haproxy_keepalived_enabled: false

# pgBackRest configuration
pgbackrest_azure_key_type: "shared"
pgbackrest_repo_type: "azure"
pgbackrest_stanza: "ppg-cluster"
pgbackrest_azure_account: "ppgclusterpgbackrest2"
pgbackrest_azure_container: "pgbackrest-repo"
