# PostgreSQL extensions configuration
extension_map:
  postgis:
    packages:
      - "percona-postgresql-{{ psql_version }}-postgis-3"
  redis_fdw:
    install_script: |
      apt install -y make libhiredis-dev percona-postgresql-server-dev-{{ psql_version }} clang-18 git make gcc
      cd /tmp
      rm -rf redis_fdw
      git clone https://github.com/pg-redis-fdw/redis_fdw.git -b REL_{{ psql_version }}_STABLE
      cd redis_fdw
      make USE_PGXS=1
      sudo make install USE_PGXS=1
