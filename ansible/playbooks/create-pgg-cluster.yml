---
- name: "Create PostgreSQL Cluster"
  hosts: "db_cluster"
  become: true
  pre_tasks:
    - name: "Update apt repo and cache"
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true
        cache_valid_time: 3600
    - name: "Upgrade all packages to the latest version"
      ansible.builtin.apt:
        upgrade: "dist"
        force_apt_get: true
  roles:
    - { role: "etcd", tags: ["etcd"] }
    - { role: "percona_postgresql", tags: ["postgresql"] }
    - { role: "pgbackrest", tags: ["pgbackrest"] }
    - { role: "patroni", tags: ["patroni"] }
    - { role: "pgbouncer", tags: ["pgbouncer"] }
