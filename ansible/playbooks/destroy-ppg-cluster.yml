---
- name: Uninstall Database Cluster and Clean Up
  hosts: db_cluster
  become: yes
  vars:
    psql_version: "17"
    pgbackrest_delete_stanza_on_destroy: true
  tasks:
    - name: Stop and disable all cluster services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - pgbouncer
        - patroni
        - postgresql
        - etcd
      ignore_errors: yes

    - name: Check if pgBackRest stanza exists before destroy
      ansible.builtin.command:
        cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} info"
      become_user: "postgres"
      register: pgbackrest_stanza_check
      changed_when: false
      failed_when: false
      run_once: true
      when:
        - pgbackrest_delete_stanza_on_destroy | bool
        - pgbackrest_stanza is defined

    - name: Delete pgBackRest stanza on destroy
      ansible.builtin.command:
        cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} stanza-delete --force"
      become_user: "postgres"
      run_once: true
      when:
        - pgbackrest_delete_stanza_on_destroy | bool
        - pgbackrest_stanza is defined
        - pgbackrest_stanza_check is defined
        - pgbackrest_stanza_check.rc == 0

    - name: Uninstall packages (PgBouncer, Percona, Patroni dependencies)
      ansible.builtin.apt:
        name:
          - pgbouncer
          - patroni
          - percona-patroni
          - percona-postgresql-{{ psql_version }}
          - percona-postgresql-server-dev-{{ psql_version }}
          - percona-release
          - python3-pythonjsonlogger
          - python3-etcd
          - python3-requests
          - python3-yaml
          - pgbackrest
          - percona-pgbackrest
        state: absent
        autoremove: yes
        purge: yes
      when: ansible_os_family == "Debian"

    - name: Remove etcd binaries
      ansible.builtin.file:
        path: "/usr/local/bin/{{ item }}"
        state: absent
      loop:
        - etcd
        - etcdctl
        - etcdutl

    - name: Remove all cluster directories and files (Data, Logs, Configs)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        # --- Postgres & Patroni ---
        - /etc/patroni
        - /var/log/patroni
        - /var/log/postgresql
        - /var/lib/postgresql/*
        - /var/lib/postgresql/.ssh
        - /etc/logrotate.d/postgresql-common
        - /etc/profile.d/patronictl.sh
        # --- etcd ---
        - /etc/etcd
        - /var/lib/etcd
        - /var/log/etcd
        - /etc/systemd/system/etcd.service
        - /etc/logrotate.d/etcd
        # --- PgBouncer ---
        - /etc/pgbouncer
        - /var/log/pgbouncer
        - /etc/logrotate.d/pgbouncer
        # --- PgBackRest ---
        - /etc/pgbackrest
        - /var/log/pgbackrest
        - /etc/logrotate.d/pgbackrest
        - /usr/local/bin/pgbackrest-backup.sh
        # --- Percona apt lists ---
        - /var/log/percona
        - /tmp/percona-release_latest.generic_all.deb
        - /etc/apt/sources.list.d/percona-ppg-{{ psql_version }}-release.list
        - /etc/apt/sources.list.d/percona-ppg-{{ psql_version }}-release.list.bak
        - /etc/apt/sources.list.d/percona-prel-release.list
        - /etc/apt/sources.list.d/percona-prel-release.list.bak
        - /etc/apt/sources.list.d/percona-telemetry-release.list
        - /etc/apt/sources.list.d/percona-telemetry-release.list.bak
        - /etc/apt/sources.list.d/percona-pmm2-client-release.list
        - /etc/apt/sources.list.d/percona-pmm2-client-release.list.bak
      ignore_errors: yes

    - name: Remove system users (etcd, postgres)
      ansible.builtin.user:
        name: "{{ item }}"
        state: absent
        remove: yes
      loop:
        - etcd
        - postgres
        - pgbackrest
      ignore_errors: yes

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Clean up APT cache
      ansible.builtin.apt:
        autoclean: yes
        clean: yes
      when: ansible_os_family == "Debian"