---
- name: Stop and Disable default PostgreSQL service
  ansible.builtin.systemd:
    name: postgresql
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Install dependencies for Patroni logging and etcd
  ansible.builtin.apt:
    name:
      - patroni
      - python3-pythonjsonlogger
      - python3-etcd
      - python3-requests
      - python3-yaml
      - python3-psycopg2
      - python3-six
      - python3-systemd
      - python3-sdnotify
    state: present
    update_cache: yes

- name: Create Patroni and PostgreSQL directories
  ansible.builtin.file:
    state: directory
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/patroni/", mode: "0755", owner: root, group: root }
    - { path: "/var/log/patroni/", mode: "2755", owner: postgres, group: adm }
    - {
        path: "/var/log/postgresql/",
        mode: "2755",
        owner: postgres,
        group: adm,
      }
    - {
        path: "{{ psql_data_dir }}",
        mode: "0700",
        owner: postgres,
        group: postgres,
      }

- name: Copy PostgreSQL configuration files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - {
        src: "postgresql.logrotate",
        dest: "/etc/logrotate.d/postgresql-common",
        owner: "root",
        group: "root",
        mode: "0644",
      }

- name: Create or update Patroni config
  tags: ["update_dcs"]
  ansible.builtin.template:
    src: patroni.j2
    dest: /etc/patroni/config.yml
    backup: yes
  notify: "reload_patroni"

- name: Enable and start Patroni service
  ansible.builtin.systemd:
    name: patroni
    enabled: yes
    state: started
    daemon_reload: yes

- name: "Wait for Patroni REST API to become available"
  tags: ["update_dcs"]
  ansible.builtin.uri:
    url: "http://127.0.0.1:8008/health"
    status_code: 200
  register: patroni_health
  until: patroni_health.status == 200
  retries: 6
  delay: 5
  ignore_errors: true
  no_log: true

- name: "Apply DCS configuration to the running cluster via REST API"
  when: patroni_health.status == 200
  tags: ["update_dcs"]
  block:
    - name: "Read generated Patroni config"
      ansible.builtin.slurp: { src: /etc/patroni/config.yml }
      register: patroni_config_raw

    - name: Apply DCS configuration to the running cluster via REST API
      ansible.builtin.uri:
        url: "http://127.0.0.1:8008/config"
        method: PATCH
        user: "{{ patroni_restapi_user }}"
        password: "{{ patroni_restapi_password }}"
        force_basic_auth: yes
        body_format: json
        body: "{{ (patroni_config_raw['content'] | b64decode | from_yaml).bootstrap.dcs }}"
        status_code: [200, 201]
      run_once: true
      changed_when: false
