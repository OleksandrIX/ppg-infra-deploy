---
- name: "Create .ssh directory"
  ansible.builtin.file:
    path: "{{ psql_home_dir }}/.ssh"
    state: directory
    owner: "postgres"
    group: "postgres"
    mode: "0700"

- name: "Create authorized_keys file"
  ansible.builtin.file:
    path: "{{ psql_home_dir }}/.ssh/authorized_keys"
    state: touch
    owner: "postgres"
    group: "postgres"
    mode: "0600"

- name: "Configure SSH key-based authentication for pgBackRest"
  when: pgbackrest_repo_type == "azure"
  block:
    - name: "Generate ed25519 key pair using native ssh-keygen"
      ansible.builtin.command:
        cmd: 'ssh-keygen -t ed25519 -f {{ psql_home_dir }}/.ssh/id_ed25519 -N "" -q -C "postgres@{{ inventory_hostname }}"'
      args:
        creates: "{{ psql_home_dir }}/.ssh/id_ed25519"

    - name: "Set ownership and permissions for SSH keys"
      ansible.builtin.file:
        path: "{{ psql_home_dir }}/.ssh/{{ item.filename }}"
        owner: "postgres"
        group: "postgres"
        mode: "{{ item.mode }}"
      loop:
        - { filename: "id_ed25519", mode: "0600" }
        - { filename: "id_ed25519.pub", mode: "0644" }

    - name: "Read the generated public key"
      ansible.builtin.slurp:
        src: "{{ psql_home_dir }}/.ssh/id_ed25519.pub"
      register: slurped_pub_key

    - name: "Set public key as a fact for other hosts to use"
      ansible.builtin.set_fact:
        pgbackrest_public_key: "{{ slurped_pub_key.content | b64decode | trim }}"

    - name: "Add public keys from all other hosts to authorized_keys"
      ansible.posix.authorized_key:
        user: "postgres"
        state: present
        key: "{{ hostvars[item]['pgbackrest_public_key'] }}"
        comment: "Key from {{ item }}"
      loop: "{{ postgres_hosts }}"
      when: item != inventory_hostname

    - name: "Configure SSH to skip strict host key checking"
      ansible.builtin.copy:
        dest: "{{ psql_home_dir }}/.ssh/config"
        content: |
          {% for host in postgres_hosts %}
          Host {{ hostvars[host]['ansible_default_ipv4']['address'] }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          {% endfor %}
        owner: "postgres"
        group: "postgres"
        mode: "0600"
