---
- name: "Create pgBackRest configuration directory"
  ansible.builtin.file:
    path: "/etc/pgbackrest"
    state: directory
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: "0750"

- name: "Copy pgBackRest logrotate configuration"
  ansible.builtin.template:
    src: "pgbackrest.logrotate.j2"
    dest: "/etc/logrotate.d/pgbackrest"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Copy pgBackRest configuration file for Azure type repository"
  ansible.builtin.template:
    src: "pgbackrest.azure.conf.j2"
    dest: "/etc/pgbackrest/pgbackrest.conf"
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: "0640"
  when: pgbackrest_repo_type == "azure"

- name: "Copy pgBackRest configuration file for POSIX type repository"
  ansible.builtin.template:
    src: "pgbackrest.posix.conf.j2"
    dest: "/etc/pgbackrest/pgbackrest.conf"
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: "0640"
  when: pgbackrest_repo_type == "posix"

- name: "Create pgBackRest directories"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ pgbackrest_user }}"
    group: pgbackrest
    mode: '0750'
  loop:
    - "/var/log/pgbackrest"
    - "/var/lib/pgbackrest"
    - "/var/spool/pgbackrest"

- name: "Create sudoers file for pgBackRest"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/pgbackrest"
    content: "postgres ALL=({{ pgbackrest_user }}) NOPASSWD: /usr/bin/pgbackrest *"
    owner: "root"
    group: "root"
    mode: '0640'
    validate: '/usr/sbin/visudo -cf %s'
