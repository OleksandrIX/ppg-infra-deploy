---
- name: "Create pgBackRest configuration directory"
  ansible.builtin.file:
    path: "/etc/pgbackrest"
    state: directory
    owner: "postgres"
    group: "postgres"
    mode: "0750"

- name: "Copy pgBackRest logrotate configuration"
  ansible.builtin.template:
    src: "pgbackrest.logrotate.j2"
    dest: "/etc/logrotate.d/pgbackrest"
    owner: "root"
    group: "root"
    mode: "0644"

- name: "Copy pgBackRest configuration file for Azure type repository"
  ansible.builtin.template:
    src: "pgbackrest.azure.conf.j2"
    dest: "/etc/pgbackrest/pgbackrest.conf"
    owner: "postgres"
    group: "postgres"
    mode: "0640"
  when: pgbackrest_repo_type == "azure"

- name: "Copy pgBackRest configuration file for POSIX type repository"
  ansible.builtin.template:
    src: "pgbackrest.posix.conf.j2"
    dest: "/etc/pgbackrest/pgbackrest.conf"
    owner: "postgres"
    group: "postgres"
    mode: "0640"
  when: pgbackrest_repo_type == "posix"
