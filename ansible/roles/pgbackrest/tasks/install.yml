---
- name: "Install pgBackRest (Debian family)"
  ansible.builtin.apt:
    name: "pgbackrest"
    state: "present"
    update_cache: true
  when: ansible_os_family == "Debian"

- name: "Install pgBackRest (RedHat family)"
  ansible.builtin.dnf:
    name: "pgbackrest"
    state: "present"
    update_cache: true
  when: ansible_os_family == "RedHat"

- name: "Remove default pgbackrest config if exists"
  ansible.builtin.file:
    path: "/etc/pgbackrest.conf"
    state: "absent"
