---
- name: Install keepalived
  ansible.builtin.package:
    name: keepalived
    state: present

- name: Ensure /etc/keepalived directory exists
  ansible.builtin.file:
    path: /etc/keepalived
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy keepalived logrotate config
  ansible.builtin.copy:
    src: keepalived.logrotate
    dest: /etc/logrotate.d/keepalived
    owner: root
    group: root
    mode: "0644"

- name: Template keepalived configuration
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0600"
  notify: restart keepalived

- name: Enable and start keepalived service
  ansible.builtin.systemd:
    name: keepalived
    state: started
    enabled: yes
    daemon_reload: yes
