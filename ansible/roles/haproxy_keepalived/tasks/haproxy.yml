---
- name: Enable ip_nonlocal_bind (allow HAProxy to bind to VIP on all nodes)
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: "1"
    state: present
    sysctl_set: true
    reload: true

- name: Install percona-haproxy
  ansible.builtin.package:
    name: percona-haproxy
    state: present

- name: Create HAProxy log directory
  ansible.builtin.file:
    path: /var/log/haproxy
    state: directory
    owner: haproxy
    group: adm
    mode: "2755"

- name: Copy HAProxy logrotate config
  ansible.builtin.copy:
    src: haproxy.logrotate
    dest: /etc/logrotate.d/haproxy
    owner: root
    group: root
    mode: "0644"

- name: Template HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: haproxy
    mode: "0640"
    validate: "percona-haproxy -c -f %s"
  notify: "reload percona-haproxy"

- name: Enable and start percona-haproxy service
  ansible.builtin.systemd:
    name: percona-haproxy
    state: started
    enabled: true
    daemon_reload: true
