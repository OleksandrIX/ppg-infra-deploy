---
- name: Install PgBouncer
  ansible.builtin.apt:
    name: percona-pgbouncer
    state: latest

- name: Create PgBouncer directories
  ansible.builtin.file:
    state: directory
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/var/log/pgbouncer/", mode: "2755", owner: postgres, group: adm }

- name: Copy PgBouncer configuration files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: "pgbouncer.logrotate", dest: "/etc/logrotate.d/pgbouncer", owner: "root", group: "root", mode: "0644" }

- name: Set up PgBouncer authentication
  include_tasks: pgbouncer_auth.yml

- name: Set PgBouncer userlist password value
  ansible.builtin.set_fact:
    pgbouncer_userlist_password: "{{ 'md5' ~ ((pgbouncer_auth_password ~ pgbouncer_auth_user) | hash('md5')) if (psql_password_encryption | lower) == 'md5' else pgbouncer_auth_password }}"

- name: Copy PgBouncer config
  vars:
    merged_pgbouncer_config: "{{ pgbouncer_config_defaults | combine(pgbouncer_config | default({}), recursive=True, list_merge='replace') }}"
    merged_pgbouncer_databases: "{{ pgbouncer_databases_defaults | combine(pgbouncer_databases | default({}), recursive=True, list_merge='replace') }}"
    merged_pgbouncer_users: "{{ pgbouncer_users_defaults | combine(pgbouncer_users | default({}), recursive=True, list_merge='replace') }}"
  ansible.builtin.template:
    src: pgbouncer.j2
    dest: /etc/pgbouncer/pgbouncer.ini
    owner: postgres
    group: postgres
    mode: "0644"
    backup: yes
  notify: "restart pgbouncer"

- name: Generate PgBouncer userlist.txt from variables
  ansible.builtin.template:
    src: userlist.j2
    dest: /etc/pgbouncer/userlist.txt
    owner: postgres
    group: postgres
    mode: "0600"
  notify: "restart pgbouncer"

- name: Enable and start PgBouncer service
  ansible.builtin.systemd:
    name: percona-pgbouncer
    enabled: yes
    state: started
    daemon_reload: yes

- name: Clean up default Ubuntu PgBouncer log file
  ansible.builtin.file:
    path: /var/log/postgresql/pgbouncer.log
    state: absent
