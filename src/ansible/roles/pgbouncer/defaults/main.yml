---
# PostgreSQL settings
postgres_monitoring_user: "exporter"
psql_password_encryption: "scram-sha-256"

# PgBouncer settings
pgbouncer_auth_user: "pgbouncer_auth"
pgbouncer_auth_password: "pgbouncer_auth_password"

# PgBouncer databases defaults
pgbouncer_databases_defaults:
  "*":
    host: "{{ ansible_default_ipv4.address }}"
    port: 5432

# PgBouncer users defaults
pgbouncer_users_defaults: {}

# PgBouncer configuration defaults
pgbouncer_config_defaults:
  listen_addr: "{{ ansible_default_ipv4.address }}"
  listen_port: 6432
  unix_socket_dir: "/var/run/postgresql"
  pidfile: "/var/run/postgresql/pgbouncer.pid"
  logfile: "/var/log/pgbouncer/pgbouncer.log"
  log_connections: 1
  log_disconnections: 1
  log_pooler_errors: 1
  auth_type: "{{ psql_password_encryption }}"
  auth_file: "/etc/pgbouncer/userlist.txt"
  auth_user: "{{ pgbouncer_auth_user }}"
  auth_query: "SELECT usename, passwd FROM public.lookup_role_password($1)"
  auth_dbname: "postgres"
  admin_users:
    - "postgres"
  stats_users:
    - "{{ postgres_monitoring_user }}"
  pool_mode: "transaction"
  ignore_startup_parameters:
    - "extra_float_digits"
    - "search_path"
  server_check_query: "select 1"
  max_client_conn: 500
  max_prepared_statements: 100
  default_pool_size: 50
  reserve_pool_size: 20
  client_idle_timeout: 300
  server_lifetime: 3600
  server_idle_timeout: 600
  server_connect_timeout: 30
  server_login_retry: 10

# Empty dictionaries to allow users to override defaults without needing to redefine the entire structure
pgbouncer_databases: {}
pgbouncer_users: {}
pgbouncer_config: {}
