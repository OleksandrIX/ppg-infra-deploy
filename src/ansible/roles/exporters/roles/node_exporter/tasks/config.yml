---
# Configure Node Exporter systemd service and verification

- name: Create node_exporter systemd service file
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart node_exporter

- name: Ensure node_exporter service is enabled and started
  ansible.builtin.systemd:
    name: node_exporter
    daemon_reload: yes
    enabled: yes
    state: started

- name: Wait for node_exporter to be ready
  ansible.builtin.wait_for:
    port: "{{ node_exporter_port }}"
    delay: 1
    timeout: 10
    host: 127.0.0.1

- name: Verify node_exporter is responding
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ node_exporter_port }}/metrics"
    method: GET
    status_code: 200
  register: node_exporter_status
  retries: 3
  delay: 2
