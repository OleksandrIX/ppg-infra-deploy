---
- name: Initialize aggregated database specs
  ansible.builtin.set_fact:
    databases: []
  run_once: true

- name: Discover database spec files
  ansible.builtin.set_fact:
    spec_files: "{{ query('fileglob', files_glob, wantlist=True) | sort }}"
  run_once: true
  when: files_glob | default('') | length > 0

- name: Load each database spec file
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: loaded_spec
  loop: "{{ spec_files | default([]) }}"
  loop_control:
    label: "{{ item | basename }}"
  register: loaded_specs
  run_once: true
  when: spec_files | default([]) | length > 0

- name: Aggregate normalized specs
  ansible.builtin.set_fact:
    databases: "{{ databases + [spec] }}"
  vars:
    loaded: "{{ item.ansible_facts.loaded_spec.database_spec }}"
    spec: "{{ {'extensions': []} | combine(loaded, recursive=True) | combine({'__source_file': item.item | basename}) }}"
  loop: "{{ loaded_specs.results | default([]) }}"
  loop_control:
    label: "{{ item.item | basename }}"
  run_once: true
  when: loaded_specs is defined and loaded_specs.results | default([]) | length > 0

- name: Propagate discovered facts to all hosts
  ansible.builtin.set_fact:
    databases: "{{ hostvars[ansible_play_hosts[0]].databases | default([]) }}"
