---
- name: Collect declared extensions from db specs
  ansible.builtin.set_fact:
    declared_extensions: "{{ databases | map(attribute='extensions') | flatten | unique | list }}"

- name: Validate extension map type
  ansible.builtin.assert:
    that:
      - extension_map is mapping
    fail_msg: "extension_map must be a mapping (dictionary), for example: {postgis: {packages: [percona-postgresql-{{ psql_version }}-postgis-3]}}"
    quiet: true

- name: Read currently available PostgreSQL extensions on node
  ansible.builtin.command: psql -U postgres -tAc "SELECT name FROM pg_available_extensions;"
  become_user: postgres
  register: available_extensions_query
  changed_when: false

- name: Build list of currently available extension names
  ansible.builtin.set_fact:
    available_extensions: "{{ available_extensions_query.stdout_lines | map('trim') | reject('equalto', '') | list }}"

- name: Build list of unmapped extensions from db specs
  ansible.builtin.set_fact:
    unmapped_extensions: "{{ declared_extensions | difference(available_extensions + extension_map.keys() | list) }}"

- name: Validate all extensions from db specs are available or mapped
  ansible.builtin.assert:
    that:
      - unmapped_extensions | length == 0
    fail_msg: >-
      Some extensions from db specs are not available on node and not mapped in extension_map: {{ unmapped_extensions | join(', ') }}.
      Add them to extension_map.
    quiet: true

- name: Build list of extensions from extension_map that are missing on node
  ansible.builtin.set_fact:
    missing_extensions: "{{ extension_map.keys() | list | difference(available_extensions) }}"

- name: Build list of extensions requiring extra repositories
  ansible.builtin.set_fact:
    extensions_needing_repos: "{{ extension_map | dict2items | selectattr('value.repo', 'defined') | map(attribute='key') | intersect(missing_extensions) | list }}"

- name: Set up extra repositories for extensions requiring them
  ansible.builtin.include_tasks: extension_repos.yml
  when: extensions_needing_repos | length > 0

- name: Build package list required by all extensions in extension_map
  ansible.builtin.set_fact:
    extension_packages: "{{ extension_map.values() | selectattr('packages', 'defined') | map(attribute='packages') | list | flatten | unique }}"

- name: Install extension packages
  ansible.builtin.package:
    name: "{{ extension_packages }}"
    state: present
  when:
    - extension_packages is defined
    - extension_packages | length > 0

- name: Run custom install script for extensions
  ansible.builtin.shell: |
    set -e
    {{ extension_map[item].install_script }}
  args:
    executable: /bin/bash
  loop: "{{ extension_map.keys() | list }}"
  when: extension_map[item].install_script is defined

- name: Re-read available PostgreSQL extensions after package installation
  ansible.builtin.command: psql -U postgres -tAc "SELECT name FROM pg_available_extensions;"
  become_user: postgres
  register: available_extensions_query_after
  changed_when: false

- name: Validate all extensions from db specs and extension_map are available on node
  ansible.builtin.assert:
    that:
      - (declared_extensions | union(extension_map.keys() | list) | difference(available_extensions_after)) | length == 0
    fail_msg: >-
      Some extensions are still unavailable on node after package installation:
      {{ (declared_extensions | union(extension_map.keys() | list) | difference(available_extensions_after)) | join(', ') }}.
    quiet: true
  vars:
    available_extensions_after: "{{ available_extensions_query_after.stdout_lines | map('trim') | reject('equalto', '') | list }}"
