---
- name: Collect declared extensions from specs and always-install list
  ansible.builtin.set_fact:
    declared_extensions: >-
      {{
        (
          databases | map(attribute='extensions') | flatten | list
          + (pg_extensions_always | default([]))
        ) | unique | list
      }}

- name: Skip extension package handling when no extensions declared
  ansible.builtin.meta: end_play
  when: declared_extensions | length == 0

- name: Validate extension package mapping type
  ansible.builtin.assert:
    that:
      - extension_package_map is mapping
    fail_msg: "extension_package_map must be a mapping (dictionary), for example: {postgis: [percona-postgresql-{{ psql_version }}-postgis-3]}"
    quiet: true

- name: Read currently available PostgreSQL extensions on node
  ansible.builtin.command: psql -U postgres -tAc "SELECT name FROM pg_available_extensions;"
  become_user: postgres
  register: available_extensions_query
  changed_when: false

- name: Build list of currently available extension names
  ansible.builtin.set_fact:
    available_extensions: "{{ available_extensions_query.stdout_lines | map('trim') | reject('equalto', '') | list }}"

- name: Build list of missing extensions from declared specs
  ansible.builtin.set_fact:
    missing_extensions: "{{ declared_extensions | difference(available_extensions) }}"

- name: Build list of unmapped missing extensions
  ansible.builtin.set_fact:
    unmapped_extensions: "{{ missing_extensions | reject('in', (extension_package_map | default({})).keys() | list) | list }}"

- name: Validate missing extensions have package mapping
  ansible.builtin.assert:
    that:
      - unmapped_extensions | length == 0
    fail_msg: >-
      Missing package mapping for extensions not available on node: {{ unmapped_extensions | join(', ') }}.
      Add them to extension_package_map.
    quiet: true

- name: Build package list required by missing extensions
  ansible.builtin.set_fact:
    extension_packages: "{{ missing_extensions | map('extract', extension_package_map) | list | flatten | unique }}"
  when: missing_extensions | length > 0

- name: Install extension packages
  ansible.builtin.package:
    name: "{{ extension_packages }}"
    state: present
  when:
    - extension_packages is defined
    - extension_packages | length > 0

- name: Re-read available PostgreSQL extensions after package installation
  ansible.builtin.command: psql -U postgres -tAc "SELECT name FROM pg_available_extensions;"
  become_user: postgres
  register: available_extensions_query_after
  changed_when: false
  when: declared_extensions | length > 0

- name: Validate all declared extensions are available on node
  ansible.builtin.assert:
    that:
      - (declared_extensions | difference(available_extensions_after)) | length == 0
    fail_msg: >-
      Some declared extensions are still unavailable on node after package installation:
      {{ declared_extensions | difference(available_extensions_after) | join(', ') }}.
    quiet: true
  vars:
    available_extensions_after: "{{ available_extensions_query_after.stdout_lines | map('trim') | reject('equalto', '') | list }}"
  when: declared_extensions | length > 0
