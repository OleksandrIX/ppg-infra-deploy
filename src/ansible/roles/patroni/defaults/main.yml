---
# Hosts
allow_connection_hosts: []
postgres_hosts: []
etcd_hosts: []

# PostgreSQL settings
psql_version: "17"
psql_data_dir: "/var/lib/postgresql/data"
psql_bin_dir: "/usr/lib/postgresql/{{ psql_version }}/bin"
psql_superuser_password: "SuperSecretPassword123!"
psql_replication_password: "ReplicationPassword456!"
psql_password_encryption: "scram-sha-256"

# Patroni settings
patroni_scope: "postgresql-cluster-example"
patroni_namespace: "/example/"
patroni_restapi_password: "RestApiPassword789!"
patroni_restapi_user: "admin"

# pgBackRest settings
pgbackrest_stanza: "ppg-cluster"

# Patroni DCS Configuration
patroni_dcs_config:
  ttl: 30
  loop_wait: 10
  retry_timeout: 10
  maximum_lag_on_failover: 1048576
  postgresql:
    use_pg_rewind: true
    use_slots: true
    create_replica_methods:
      - "basebackup"
      - "pgbackrest"
    parameters:
      archive_mode: true
      archive_timeout: "600s"
      archive_command: "pgbackrest --stanza={{ pgbackrest_stanza }} archive-push %p"
      restore_command: "pgbackrest --stanza={{ pgbackrest_stanza }} archive-get %f %p"
      shared_buffers: "2GB"
      effective_cache_size: "6GB"
      maintenance_work_mem: "1GB"
      work_mem: "16MB"
      hot_standby: true
      password_encryption: "{{ psql_password_encryption }}"
      log_connections: true
      log_destination: "stderr"
      log_directory: "/var/log/postgresql"
      log_disconnections: true
      log_duration: false
      log_min_duration_statement: "1000ms"
      log_error_verbosity: "verbose"
      log_file_mode: "0640"
      log_filename: "postgresql.log"
      log_line_prefix: "%m [pid=%p] user=%u db=%d app=%a "
      log_min_messages: "info"
      log_rotation_age: "1d"
      log_rotation_size: 0
      log_statement: "ddl"
      log_truncate_on_rotation: "off"
      logging_collector: "on"
      max_connections: 100
      max_prepared_transactions: 100
      max_replication_slots: 10
      max_wal_senders: 5
      min_wal_size: "256MB"
      max_wal_size: "1GB"
      max_slot_wal_keep_size: "10GB"
      wal_buffers: "16MB"
      wal_keep_size: "160MB"
      wal_level: "replica"
      wal_log_hints: true
    pgbackrest:
      command: "pgbackrest --stanza={{ pgbackrest_stanza }} --delta restore"
      keep_data: true
      no_params: true
    recovery_conf:
      restore_command: "pgbackrest --stanza={{ pgbackrest_stanza }} archive-get %f %p"
    pg_hba:
      - local all postgres peer
      - local all all {{ psql_password_encryption }}
      - host all all 127.0.0.1/32 {{ psql_password_encryption }}
      - host all postgres 0.0.0.0/0 reject
  slots: {}
