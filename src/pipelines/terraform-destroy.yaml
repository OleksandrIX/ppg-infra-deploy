steps:
- task: AzureCLI@2
  displayName: 'Destroy Terraform Deployment'
  inputs:
    azureSubscription: $(azureSubscription)
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    workingDirectory: 'envs/${{ parameters.environment }}/terraform'
    inlineScript: |
      terraform destroy --auto-approve
  env:
    TF_VAR_pgbackrest_azure_key: $(pgbackrest_azure_key)
