steps:
- task: AzureCLI@2
  displayName: 'Get or Create Storage Container'
  inputs:
    azureSubscription: $(azureSubscription)
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      STORAGE_ACCOUNT="$(storageAccount)"
      CONTAINER_NAME="$(containerName)"
      RESOURCE_GROUP="$(resourceGroup)"
      
      # Check if container exists, create if not
      if ! az storage container show --name $CONTAINER_NAME --account-name $STORAGE_ACCOUNT --auth-mode login &>/dev/null; then
        echo "Container $CONTAINER_NAME does not exist. Creating..."
        az storage container create \
          --name $CONTAINER_NAME \
          --account-name $STORAGE_ACCOUNT \
          --resource-group $RESOURCE_GROUP \
          --auth-mode login \
          --public-access off
        echo "Container created successfully"
      else
        echo "Container $CONTAINER_NAME already exists"
      fi