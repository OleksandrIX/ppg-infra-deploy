steps:
- task: AzureCLI@2
  displayName: 'Plan Terraform deployment'
  inputs:
    azureSubscription: $(azureSubscription)
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    workingDirectory: 'envs/${{ parameters.environment }}/terraform'
    inlineScript: |
      terraform plan -input=false -out=tfplan
  env:
    TF_VAR_pgbackrest_azure_key: $(pgbackrest_azure_key)